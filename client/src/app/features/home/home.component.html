<main class="shell">
  <section class="panel" aria-labelledby="page-title">
    <p class="eyebrow">MEAN stack</p>
    <h1 id="page-title">mean_ai</h1>
    <p class="summary">
      Angular is connected to the Express API contract and ready for feature work.
    </p>

    @if (vm(); as vm) {
      <div
        class="alert d-inline-flex align-items-center gap-2 mb-0"
        [class.alert-secondary]="vm.state === 'loading'"
        [class.alert-success]="vm.state === 'ready'"
        [class.alert-danger]="vm.state === 'error'"
      >
        <span class="status__dot" aria-hidden="true"></span>
        @if (vm.state === 'loading') {
          <span>Checking API status...</span>
        }
        @if (vm.state === 'ready') {
          <span>API online: {{ vm.service }}</span>
        }
        @if (vm.state === 'error') {
          <span>{{ vm.message }}</span>
        }
      </div>
    }
  </section>
</main>
